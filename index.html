<!DOCTYPE html>
<html>
<head>
    <title>Granny: Abandoned House</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>body { margin: 0; overflow: hidden; background: #000; }</style>
</head>
<body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/OBJLoader.js"></script>

    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 1. IŞIKLANDIRMA (Evi görebilmek için şart)
        const light = new THREE.PointLight(0xffffff, 1, 100);
        camera.add(light);
        scene.add(camera);

        // 2. SENİN GITHUB EVİN (Abandon_House)
        const loader = new THREE.OBJLoader();
        // Dosya adı GitHub'dakiyle aynı olmalı!
        loader.load('uploads_files_5503139_Abandon_House.obj', (obj) => {
            obj.scale.set(0.1, 0.1, 0.1); // Çok büyükse küçültür
            scene.add(obj);
            console.log("Ev yüklendi!");
        });

        // 3. GRANNY (O kırmızı blok)
        const gGeo = new THREE.BoxGeometry(0.8, 2, 0.8);
        const gMat = new THREE.MeshBasicMaterial({ color: 0xff0000 });
        const granny = new THREE.Mesh(gGeo, gMat);
        granny.position.set(5, 0, -10);
        scene.add(granny);

        camera.position.z = 5;
        let move = false;
        window.ontouchstart = () => move = true;
        window.ontouchend = () => move = false;

        function animate() {
            requestAnimationFrame(animate);
            granny.lookAt(camera.position);
            granny.translateZ(0.03); // Granny'nin hızı
            if(move) camera.translateZ(-0.1);
            if(granny.position.distanceTo(camera.position) < 1.2) {
                alert("YAKALANDIN!");
                location.reload();
            }
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>

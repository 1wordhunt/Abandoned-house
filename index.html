<!DOCTYPE html>
<html>
<head>
    <title>Ev Test</title>
</head>
<body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/FBXLoader.js"></script>
    
    <script>
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111122);
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 2, 10);
        
        const renderer = new THREE.WebGLRenderer();
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);
        
        // Işık
        const light = new THREE.PointLight(0xffffff, 1, 30);
        light.position.set(5, 10, 5);
        scene.add(light);
        
        const ambient = new THREE.AmbientLight(0x404060);
        scene.add(ambient);
        
        // Zemin
        const ground = new THREE.Mesh(
            new THREE.PlaneGeometry(100, 100),
            new THREE.MeshStandardMaterial({ color: 0x335533 })
        );
        ground.rotation.x = -Math.PI/2;
        ground.position.y = 0;
        scene.add(ground);
        
        // MODEL YÜKLE
        const loader = new THREE.FBXLoader();
        loader.load(
            'models/uploads_files_5503139_cgtrader_optimized_Abandon_House.fbx',
            function(obj) {
                obj.scale.set(0.1, 0.1, 0.1);
                obj.position.set(0, 0, 0);
                scene.add(obj);
                console.log('Ev yüklendi!');
            },
            function(xhr) {
                console.log((xhr.loaded / xhr.total * 100) + '% yüklendi');
            },
            function(error) {
                console.error('Hata:', error);
            }
        );
        
        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>

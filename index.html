<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🏚️ Granny Evi - 3D Korku Oyunu</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            touch-action: none;
            background: black;
        }
        
        #info {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: white;
            background: rgba(0,0,0,0.7);
            padding: 10px 20px;
            border-radius: 50px;
            font-size: 14px;
            z-index: 100;
            backdrop-filter: blur(5px);
            border: 1px solid #8b4513;
            pointer-events: none;
        }
        
        #loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            background: rgba(0,0,0,0.8);
            padding: 20px 40px;
            border-radius: 10px;
            font-size: 18px;
            z-index: 200;
            border: 2px solid #8b4513;
        }
        
        #joystick-left {
            position: fixed;
            bottom: 80px;
            left: 30px;
            width: 120px;
            height: 120px;
            background: rgba(139, 69, 19, 0.3);
            border: 3px solid #8b4513;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 150;
            backdrop-filter: blur(5px);
            touch-action: none;
        }
        
        #joystick-inner {
            width: 60px;
            height: 60px;
            background: rgba(139, 69, 19, 0.7);
            border-radius: 50%;
            transition: transform 0.05s;
            border: 2px solid #cd853f;
        }
        
        #look-area {
            position: fixed;
            bottom: 0;
            right: 0;
            width: 60vw;
            height: 100vh;
            background: transparent;
            z-index: 130;
            touch-action: none;
        }
        
        #action-btn {
            position: fixed;
            bottom: 100px;
            right: 30px;
            width: 80px;
            height: 80px;
            background: rgba(180, 0, 0, 0.7);
            border: 3px solid #ff0000;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 30px;
            font-weight: bold;
            z-index: 140;
            backdrop-filter: blur(5px);
            touch-action: none;
            box-shadow: 0 0 20px #ff0000;
        }
        
        @media (max-width: 768px) {
            #joystick-left { width: 100px; height: 100px; left: 20px; bottom: 60px; }
            #joystick-inner { width: 50px; height: 50px; }
            #action-btn { width: 70px; height: 70px; right: 20px; bottom: 80px; font-size: 24px; }
        }
    </style>
</head>
<body>
    <div id="loading">🏚️ Ev yükleniyor... 0%</div>
    <div id="info">👇 Sol joystick | 👆 Sağ ekranı kaydır | 🔴 Buton etkileşim</div>
    
    <div id="joystick-left">
        <div id="joystick-inner"></div>
    </div>
    
    <div id="look-area"></div>
    
    <div id="action-btn">🔍</div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/FBXLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/OBJLoader.js"></script>
    
    <script>
        // Oyun değişkenleri
        let scene, camera, renderer;
        let player = { x: 5, y: 2, z: 5 };
        let keys = {};
        let pitch = 0, yaw = 0;
        let loadingDiv = document.getElementById('loading');
        
        // Mobil kontroller
        let joystickActive = false;
        let joystickPos = { x: 0, y: 0 };
        let lookTouchStart = { x: 0, y: 0 };
        let moveDir = { x: 0, z: 0 };
        
        // Texture loader
        const textureLoader = new THREE.TextureLoader();
        
        // Sahne kurulumu
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111122);
        scene.fog = new THREE.Fog(0x111122, 10, 50);
        
        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(5, 2, 5);
        
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);
        
        // Işıklandırma
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);
        
        const dirLight = new THREE.DirectionalLight(0xffeedd, 1);
        dirLight.position.set(5, 10, 7);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 1024;
        dirLight.shadow.mapSize.height = 1024;
        scene.add(dirLight);
        
        const torchLight = new THREE.PointLight(0xffaa66, 1.5, 20);
        torchLight.position.copy(camera.position);
        scene.add(torchLight);
        
        // Zemin
        const groundGeometry = new THREE.PlaneGeometry(100, 100);
        const groundMaterial = new THREE.MeshStandardMaterial({ color: 0x335533 });
        const ground = new THREE.Mesh(groundGeometry, groundMaterial);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = 0;
        ground.receiveShadow = true;
        scene.add(ground);
        
        // ----- EV MODELİ YÜKLEME -----
        const fbxLoader = new THREE.FBXLoader();
        
        // Texture'ların yolu
        const texturePath = 'textures/';
        
        fbxLoader.load(
            'models/cgtrader_optimized_Abandon_House.fbx',
            function(object) {
                object.scale.set(0.1, 0.1, 0.1);
                object.position.set(0, 0, 0);
                
                // Texture'ları uygula
                object.traverse(function(child) {
                    if (child.isMesh) {
                        child.castShadow = true;
                        child.receiveShadow = true;
                        
                        // Eğer material varsa texture ekle
                        if (child.material) {
                            // Burada texture'ları atayabiliriz
                            // Örnek: child.material.map = textureLoader.load(texturePath + 'Abandon_House_Blocks_BaseColor.png');
                        }
                    }
                });
                
                scene.add(object);
                loadingDiv.style.display = 'none';
                console.log('Ev yüklendi!');
            },
            function(xhr) {
                const percent = (xhr.loaded / xhr.total * 100).toFixed(0);
                loadingDiv.innerHTML = `🏚️ Ev yükleniyor... ${percent}%`;
            },
            function(error) {
                console.error('FBX yüklenemedi:', error);
                loadingDiv.innerHTML = '❌ Yükleme hatası!';
            }
        );
        
        // ----- MOBİL KONTROLLER -----
        const joystick = document.getElementById('joystick-left');
        const inner = document.getElementById('joystick-inner');
        const lookArea = document.getElementById('look-area');
        const actionBtn = document.getElementById('action-btn');
        
        // Joystick hareket
        joystick.addEventListener('touchstart', (e) => {
            joystickActive = true;
            e.preventDefault();
        });
        
        joystick.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            const rect = joystick.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            
            let dx = touch.clientX - centerX;
            let dy = touch.clientY - centerY;
            const dist = Math.sqrt(dx*dx + dy*dy);
            const max = rect.width / 2;
            
            if (dist > max) {
                dx = (dx / dist) * max;
                dy = (dy / dist) * max;
            }
            
            inner.style.transform = `translate(${dx}px, ${dy}px)`;
            moveDir.x = dx / max;
            moveDir.z = -dy / max;
        });
        
        joystick.addEventListener('touchend', () => {
            joystickActive = false;
            inner.style.transform = 'translate(0px, 0px)';
            moveDir.x = 0;
            moveDir.z = 0;
        });
        
        // Bakış kontrolü (sağ ekran)
        lookArea.addEventListener('touchstart', (e) => {
            const touch = e.touches[0];
            lookTouchStart.x = touch.clientX;
            lookTouchStart.y = touch.clientY;
        });
        
        lookArea.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            const dx = (touch.clientX - lookTouchStart.x) * 0.01;
            const dy = (touch.clientY - lookTouchStart.y) * 0.01;
            
            yaw -= dx;
            pitch -= dy;
            pitch = Math.max(-Math.PI/3, Math.min(Math.PI/3, pitch));
            
            camera.rotation.y = yaw;
            camera.rotation.x = pitch;
            
            lookTouchStart.x = touch.clientX;
            lookTouchStart.y = touch.clientY;
        });
        
        // Aksiyon butonu
        actionBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            console.log('Etkileşim butonuna basıldı');
            // Buraya kapı açma, eşya toplama kodları gelecek
        });
        
        // Oyun döngüsü
        function animate() {
            requestAnimationFrame(animate);
            
            // Hareket (joystick + PC)
            let moveX = moveDir.x * 0.15;
            let moveZ = moveDir.z * 0.15;
            
            if (keys['w']) moveZ += 0.15;
            if (keys['s']) moveZ -= 0.15;
            if (keys['a']) moveX -= 0.15;
            if (keys['d']) moveX += 0.15;
            
            if (moveX !== 0 || moveZ !== 0) {
                const angle = camera.rotation.y;
                player.x += moveX * Math.cos(angle) - moveZ * Math.sin(angle);
                player.z += moveX * Math.sin(angle) + moveZ * Math.cos(angle);
                
                camera.position.x = player.x;
                camera.position.z = player.z;
            }
            
            torchLight.position.copy(camera.position);
            renderer.render(scene, camera);
        }
        
        animate();
        
        // Klavye kontrolleri (PC için)
        window.addEventListener('keydown', (e) => keys[e.key.toLowerCase()] = true);
        window.addEventListener('keyup', (e) => keys[e.key.toLowerCase()] = false);
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>

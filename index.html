<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏚️ Granny Evi - 3D</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: Arial, sans-serif; }
        #info {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: white;
            background: rgba(0,0,0,0.7);
            padding: 10px 20px;
            border-radius: 8px;
            z-index: 100;
        }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            background: rgba(0,0,0,0.8);
            padding: 20px 40px;
            border-radius: 10px;
            z-index: 200;
        }
    </style>
</head>
<body>
    <div id="loading">🏚️ Ev yükleniyor...</div>
    <div id="info">WASD ile hareket | Fare ile bak | Granny seni bekliyor...</div>

    <!-- Three.js kütüphaneleri -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/FBXLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/OBJLoader.js"></script>
    
    <script>
        // Oyun değişkenleri
        let scene, camera, renderer;
        let player = { x: 0, y: 2, z: 5 };
        let keys = {};
        let mouseX = 0, mouseY = 0;
        
        // Yükleme mesajı
        const loadingDiv = document.getElementById('loading');
        
        // Sahne kurulumu
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111122);
        scene.fog = new THREE.Fog(0x111122, 10, 50);
        
        // Kamera
        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(5, 2, 10);
        
        // Renderer
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);
        
        // Işıklandırma
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);
        
        const dirLight = new THREE.DirectionalLight(0xffeedd, 1);
        dirLight.position.set(5, 10, 7);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 1024;
        dirLight.shadow.mapSize.height = 1024;
        scene.add(dirLight);
        
        // El feneri efekti
        const torchLight = new THREE.PointLight(0xffaa66, 1.5, 20);
        torchLight.position.copy(camera.position);
        scene.add(torchLight);
        
        // Zemin
        const groundGeometry = new THREE.PlaneGeometry(100, 100);
        const groundMaterial = new THREE.MeshStandardMaterial({ color: 0x335533 });
        const ground = new THREE.Mesh(groundGeometry, groundMaterial);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = 0;
        ground.receiveShadow = true;
        scene.add(ground);
        
        // ----- EV MODELİ -----
        // FBX denemek için
        const fbxLoader = new THREE.FBXLoader();
        fbxLoader.load(
            'models/Abandon_House.fbx', // veya cgtrader_optimized_Abandon_House.fbx
            function(object) {
                object.scale.set(0.1, 0.1, 0.1); // Boyutunu ayarla
                object.position.set(0, 0, 0);
                object.traverse(function(child) {
                    if (child.isMesh) {
                        child.castShadow = true;
                        child.receiveShadow = true;
                    }
                });
                scene.add(object);
                loadingDiv.style.display = 'none';
                console.log('Ev yüklendi!');
            },
            function(xhr) {
                console.log((xhr.loaded / xhr.total * 100) + '% yüklendi');
            },
            function(error) {
                console.error('FBX yüklenemedi:', error);
                // OBX ile dene
                const objLoader = new THREE.OBJLoader();
                objLoader.load(
                    'models/Abandon_House.obj',
                    function(object) {
                        object.scale.set(0.1, 0.1, 0.1);
                        object.position.set(0, 0, 0);
                        scene.add(object);
                        loadingDiv.style.display = 'none';
                        console.log('OBJ yüklendi!');
                    }
                );
            }
        );
        
        // Kontroller
        window.addEventListener('keydown', (e) => keys[e.key.toLowerCase()] = true);
        window.addEventListener('keyup', (e) => keys[e.key.toLowerCase()] = false);
        
        // Fare bakış
        document.addEventListener('mousemove', (e) => {
            if (document.pointerLockElement) {
                camera.rotation.y -= e.movementX * 0.002;
                camera.rotation.x -= e.movementY * 0.002;
                camera.rotation.x = Math.max(-Math.PI/3, Math.min(Math.PI/3, camera.rotation.x));
            }
        });
        
        // Fare kilidi
        document.addEventListener('click', () => {
            document.body.requestPointerLock();
        });
        
        // Oyun döngüsü
        function animate() {
            requestAnimationFrame(animate);
            
            // Hareket
            let moveX = 0, moveZ = 0;
            if (keys['w']) moveZ += 0.2;
            if (keys['s']) moveZ -= 0.2;
            if (keys['a']) moveX -= 0.2;
            if (keys['d']) moveX += 0.2;
            
            if (moveX !== 0 || moveZ !== 0) {
                const angle = camera.rotation.y;
                player.x += moveX * Math.cos(angle) - moveZ * Math.sin(angle);
                player.z += moveX * Math.sin(angle) + moveZ * Math.cos(angle);
                
                camera.position.x = player.x;
                camera.position.z = player.z;
            }
            
            // El feneri kamerayı takip etsin
            torchLight.position.copy(camera.position);
            
            renderer.render(scene, camera);
        }
        
        animate();
        
        // Pencere boyutu değişince
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
